name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la imagen (ej: 1.0.0, latest)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            unraiders/plex-trans:backend
            unraiders/plex-trans:backend-${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend
          push: true
          tags: |
            unraiders/plex-trans:frontend
            unraiders/plex-trans:frontend-${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
